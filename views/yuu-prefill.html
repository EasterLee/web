<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>YUU Attendance Prefilled</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
			crossorigin="anonymous"
		/>
		<style>
			body {
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				background: linear-gradient(135deg, #e8f4f8 0%, #dce8f0 50%, #cfe0ec 100%);
				font-family: "DM Sans", sans-serif;
				padding: 2rem 1rem;
			}
			.form-card {
				background: #ffffff;
				border-radius: 16px;
				box-shadow: 0 8px 40px rgba(0, 80, 120, 0.12);
				padding: 2.5rem 2.5rem;
				width: 100%;
				max-width: 520px;
			}
			.btn-submit {
				background: #31b3ff;
				color: rgba(255, 255, 255, 0.945);
			}
			.btn-submit:hover {
				background: #31b3ff;
				color: black;
			}
		</style>
	</head>
	<body>
		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
			crossorigin="anonymous"
		></script>

		<div class="form-card">
			<form id="the-form">
				<!-- Name -->
				<div class="mb-3">
					<label for="name" class="form-label">Full Name</label>
					<input type="text" class="form-control" id="name" name="name" />
				</div>

				<!-- Email -->
				<div class="mb-3">
					<label for="email" class="form-label">Email Address</label>
					<div class="input-group">
						<input type="text" class="form-control" id="email" name="email" />
						<span class="input-group-text">@my.yearupunited.org</span>
					</div>
				</div>

				<!-- City -->
				<div class="mb-3">
					<label for="city" class="form-label">City</label>
					<select class="form-select" id="city" name="city">
						<option value="" disabled selected>Select a city...</option>
					</select>
				</div>

				<!-- Career Pathway -->
				<div class="mb-3">
					<label for="pathway" class="form-label">Career Pathway</label>
					<select class="form-select" id="pathway" name="pathway">
						<option value="" disabled selected>Select a pathway...</option>
					</select>
				</div>

				<!-- Program Manager -->
				<div class="mb-3">
					<label for="pm" class="form-label">Program Manager</label>
					<select class="form-select" id="pm" name="pm">
						<option value="" disabled selected>Select a manager...</option>
					</select>
				</div>

				<button type="submit" class="btn btn-submit" id="button-submit">Generate →</button>
			</form>
			<div id="post-generate" class="mb-3 mt-3" style="display: none">
				<p>Save the QRCode or bookmark the url below</p>
				<div id="qrcode"></div>
				<p><a id="yuu-url" class="text-break link-dark link-opacity-50-hover link-offset-2" href="" target="_blank"></a></p>
			</div>
		</div>
		<script src="./js/options.js" type="module"></script>
		<script src="./js/qrcode.js"></script>
	</body>
</html>
