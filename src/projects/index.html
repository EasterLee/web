<!doctype html>
<html lang="en" data-bs-theme="dark">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Connor's Projects</title>
		<script type="module" src="/main.js"></script>
	</head>
	<body
		class="d-flex flex-column vh-100 corben-regular user-select-none"
		style="visibility: hidden"
	>
		<nav class="navbar navbar-expand-sm">
			<div class="container-fluid justify-content-start">
				<a class="navbar-brand corben-bold fs-3 mx-3" href="#">conno.xyz</a>
				<button
					class="navbar-toggler ms-auto"
					type="button"
					data-bs-toggle="collapse"
					data-bs-target="#navbarNavAltMarkup"
					aria-controls="navbarNavAltMarkup"
					aria-expanded="false"
					aria-label="Toggle navigation"
				>
					<span class="navbar-toggler-icon"></span>
				</button>
				<div class="collapse navbar-collapse" id="navbarNavAltMarkup">
					<div class="navbar-nav ms-3 corben-bold flex-grow-1">
						<a class="nav-link" href="/">Cove</a>
						<a class="nav-link active">Projects</a>
					</div>
					<a class="mx-3" href="https://github.com/EasterLee/"
						><img src="/svg/github-white.svg" width="30" height="30"
					/></a>
				</div>
			</div>
		</nav>
		<div class="position-relative flex-grow-1">
			<canvas
				class="position-absolute w-100 h-100"
				style="
					background-image: linear-gradient(
						to bottom,
						rgb(8, 8, 8) 33%,
						rgb(32, 30, 43) 66%,
						rgb(126, 113, 161)
					);
					z-index: -1;
					position: fixed;
				"
			></canvas>
			<div class="container-fluid p-5">
				<div class="row justify-content-center align-items-center" id="row">
					<div class="col-auto" id="card-template">
						<div class="card m-3 shadow-lg">
							<img src="/png/gol.png" class="card-img-top" />
							<div class="card-body">
								<h5 class="card-title">Game of Life</h5>
								<p class="card-text">Make life using paint brush!</p>
								<a href="/gol/" class="btn btn-secondary">Click me!!!</a>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
		<style>
			.card {
				width: 18rem;
				background-color: hsla(0, 0%, 100%, 0.05);
			}
		</style>
	</body>
	<script>
		document.addEventListener("DOMContentLoaded", () => {
			document.body.style.visibility = "visible";
		});
		let row = document.querySelector("#row");
		let temp = document.querySelector("#card-template");
		function createCard(imgSrc, title, content, button, url) {
			let clone = temp.cloneNode(true);
			clone.querySelector(".card-img-top").src = imgSrc;
			clone.querySelector(".card-title").textContent = title;
			clone.querySelector(".card-text").textContent = content;
			clone.querySelector(".btn").textContent = button;
			clone.querySelector(".btn").href = url;
			clone.id = "";
			row.appendChild(clone);
		}
		createCard(
			"/png/yuu.png",
			"YUU Attendance URL Generator",
			"Generate a prefilled link for YUU Attendance Form",
			"Click Me Instead!!",
			"/yuu-prefill/",
		);
	</script>
</html>
