<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
			crossorigin="anonymous"
		/>
		<style>
			* {
				box-sizing: border-box;
			}
			body {
				overflow: hidden;
				margin: 0;
				padding: 0;
			}
			.config-panel {
				color: rgb(206, 206, 206);
				position: fixed;
				z-index: 1;
				width: 0px;
				height: 100vh;
				right: 0;
				overflow: hidden;
				transition: 0.5s;
				background: rgba(0, 128, 0, 0.411);
				user-select: none;
			}
			.config-header {
				margin-left: 25px;
			}
			.config-content {
				margin-left: 25px;
				padding-left: 15px;
				width: 300px;
			}
			.config-button {
				position: fixed;
				z-index: 2;
				width: 30px;
				height: 30px;
				right: 0;
				overflow: hidden;
				transition: 0.5s;
			}
			.open {
				width: 300px;
			}
			canvas {
				position: fixed;
				z-index: 0;
			}
		</style>
	</head>
	<body>
		<canvas></canvas>
		<script src="./gol.js" type="module"></script>
		<button class="config-button" type="button">&#9776;</button>
		<div class="config-panel open">
			<h1 class="config-header">Config</h1>
			<div class="config-content">
				<div>
					<label for="brush-size-slider">Brush Size</label>
					<input
						type="range"
						id="brush-size-slider"
						min="1"
						max="10"
						value="5"
						step="1"
					/>
					<input type="number" id="brush-size-number" value="5" />
				</div>
				<div>
					<label for="">FPS</label>
					<input
						type="range"
						id="fps-slider"
						min="0"
						max="60"
						value="30"
						step="1"
					/>
					<input type="number" id="fps-number" value="30" />
				</div>
			</div>
		</div>
		<script>
			let open = false;
			let but = document.querySelector(".config-button");
			let panel = document.querySelector(".config-panel");
			but.addEventListener("click", () => {
				if (open) {
					panel.classList.remove("open");
				} else {
					panel.classList.add("open");
				}
				open = !open;
			});

			document
				.querySelectorAll("input")
				.forEach((i) => (i.autocomplete = "off"));
		</script>
	</body>
</html>
